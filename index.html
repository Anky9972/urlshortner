<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />

    <!-- ===== Primary Meta Tags ===== -->
    <title>TrimLink – Free URL Shortener, QR Code Generator & LinkTree Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TrimLink is a free URL shortener with powerful analytics, custom QR code generator, and link-in-bio page builder. Shorten links, track clicks, geo-target, and install as a PWA."
    />
    <meta
      name="keywords"
      content="url shortener, free url shortener, link shortener, QR code generator, linktree alternative, link in bio, link analytics, geo targeting, custom short links, branded links, link management, trimlynk"
    />
    <meta name="author" content="TrimLink" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <link rel="apple-touch-icon" href="/images/logo.png" />
    <link rel="shortcut icon" href="/images/logo.png" />

    <!-- ===== Theme & PWA ===== -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TrimLink" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ===== Canonical ===== -->
    <link rel="canonical" href="https://trimlynk.com/" />

    <!-- ===== Open Graph ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrimLink" />
    <meta property="og:title" content="TrimLink – Free URL Shortener, QR Code Generator & LinkTree Builder" />
    <meta
      property="og:description"
      content="Shorten URLs, generate custom QR codes, build link-in-bio pages, and track clicks with real-time analytics. Free to use. No signup required."
    />
    <meta property="og:url" content="https://trimlynk.com/" />
    <meta property="og:image" content="https://trimlynk.com/images/og-banner.png" />
    <meta property="og:image:alt" content="TrimLink – URL Shortener & Analytics" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@anky_vivek" />
    <meta name="twitter:creator" content="@anky_vivek" />
    <meta name="twitter:title" content="TrimLink – Free URL Shortener, QR Code Generator & LinkTree Builder" />
    <meta
      name="twitter:description"
      content="Shorten URLs, generate custom QR codes, and build link-in-bio pages with real-time analytics. Free & instant."
    />
    <meta name="twitter:image" content="https://trimlynk.com/images/og-banner.png" />

    <!-- ===== Preconnect to speed up page load ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://urlshortner-onhm.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://urlshortner-onhm.onrender.com" />

    <!-- ===== Preload critical assets ===== -->
    <link rel="preload" as="image" href="/images/logo.png" fetchpriority="high" />

    <!-- ===== Structured Data: Organization ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TrimLink",
        "url": "https://trimlynk.com",
        "logo": "https://trimlynk.com/images/logo.png",
        "description": "TrimLink is a free URL shortener with advanced analytics, QR code generation, and link-in-bio page builder.",
        "sameAs": [
          "https://trimlynk.com"
        ]
      }
    </script>

    <!-- ===== Structured Data: SoftwareApplication ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "TrimLink",
        "url": "https://trimlynk.com",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Web, iOS, Android",
        "description": "Free URL shortener with advanced analytics, QR code generator, geo-targeting, password protection, and link-in-bio page builder.",
        "image": "https://trimlynk.com/images/og-banner.png",
        "screenshot": "https://trimlynk.com/images/og-banner.png",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "URL Shortening",
          "QR Code Generator",
          "LinkTree / Link-in-Bio Builder",
          "Click Analytics",
          "Geo Targeting",
          "Password Protected Links",
          "Custom Domains",
          "API Access",
          "Two-Factor Authentication",
          "Progressive Web App"
        ],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://trimlynk.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ===== Structured Data: WebSite with SearchAction ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TrimLink",
        "url": "https://trimlynk.com",
        "description": "Free URL shortener, QR code generator, and link-in-bio builder with real-time analytics.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://trimlynk.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_TRACKING_ID%"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "%VITE_GA_TRACKING_ID%");
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
